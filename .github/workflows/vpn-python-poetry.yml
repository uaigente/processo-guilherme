name: Run process through VPN

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vpn-python-poetry:
    name: Linux + Python + Poetry + VPN
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: '3.13'
      VPN_URL: ${{ secrets.VPN_URL }}
      VPN_USER: ${{ secrets.VPN_USER }}
      VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
      VPN_VERIFY_URL: ${{ secrets.VPN_VERIFY_URL }}
      VPN_SERVER_CERT_PIN: ${{ secrets.VPN_SERVER_CERT_PIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies with Poetry
        run: |
          poetry install --no-interaction --no-ansi --no-root

      - name: Connect to VPN and verify
        id: vpn_connect
        continue-on-error: true
        run: |
          if [ -z "$VPN_URL" ] || [ -z "$VPN_USER" ] || [ -z "$VPN_PASSWORD" ] || [ -z "$VPN_VERIFY_URL" ]; then
            echo "Missing required VPN secrets. Please configure VPN_URL, VPN_USER, VPN_PASSWORD and VPN_VERIFY_URL."
            echo "connected=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y openconnect

          OPENCONNECT_ARGS="--protocol=anyconnect --useragent 'AnyConnect' --user '$VPN_USER' --passwd-on-stdin --no-dtls"
          if [ -n "$VPN_SERVER_CERT_PIN" ]; then
            OPENCONNECT_ARGS="$OPENCONNECT_ARGS --servercert $VPN_SERVER_CERT_PIN"
          fi

          printf '%s\n' "$VPN_PASSWORD" | sudo openconnect $OPENCONNECT_ARGS "$VPN_URL" --background --script /etc/vpnc/vpnc-script
          sleep 20

          if curl -sSfL "$VPN_VERIFY_URL" >/dev/null 2>&1; then
            echo "connected=true" >> "$GITHUB_OUTPUT"
          else
            echo "connected=false" >> "$GITHUB_OUTPUT"
            echo "VPN connection verification failed. Check the VPN URL, credentials and VPN_VERIFY_URL."
          fi

      - name: Run process only after VPN is connected
        if: steps.vpn_connect.outputs.connected == 'true'
        run: |
          echo "VPN connected successfully. Starting the process..."
          poetry run python -m my_pkg.main

      - name: Skip process because VPN failed
        if: steps.vpn_connect.outputs.connected != 'true'
        run: |
          echo "Skipping process because VPN was not connected successfully."
